<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ÆM · player</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">ÆM</span>
      <span class="sub">multi-pista · debug player</span>
      <span id="loading-spinner" class="spinner" style="display:none;" aria-label="cargando"></span>
    </div>
    <div class="comp-picker">
      <label for="comp-select">composición</label>
      <select id="comp-select"></select>
      <button id="reload" title="recargar">↻</button>
    </div>
  </header>

  <section class="transport">
    <div class="transport-buttons">
      <button id="play" class="btn-primary">▶</button>
      <button id="stop">■</button>
      <button id="restart" title="volver al inicio">⤺</button>
    </div>
    <div class="time-display">
      <span id="time-current">00:00</span>
      <span class="time-sep">/</span>
      <span id="time-total">00:00</span>
    </div>
    <div class="seek-wrap">
      <input type="range" id="seek" min="0" max="1000" value="0" step="1">
    </div>
    <div class="master-gain-wrap">
      <label>master</label>
      <input type="range" id="master-gain" min="0" max="1.5" step="0.01" value="1">
      <span id="master-gain-value">1.00</span>
    </div>
    <div class="all-actions">
      <button id="unmute-all" title="quitar todos los mutes">unmute all</button>
      <button id="unsolo-all" title="quitar todos los solos">unsolo all</button>
    </div>
  </section>

  <main id="tracks" class="tracks"></main>

  <footer class="statusbar">
    <span id="status">esperando…</span>
    <span class="hint">click waveform → seek · M mute · S solo · slider gain por pista</span>
  </footer>

  <template id="track-row">
    <div class="track-row" data-track-name="">
      <div class="track-controls">
        <button class="mute" title="Mute — silencia esta pista (toggle)">M</button>
        <button class="solo" title="Solo — solo esta pista suena, las demás se silencian (toggle)">S</button>
        <div class="track-info">
          <span class="track-name"></span>
          <span class="track-meta"></span>
        </div>
      </div>
      <div class="track-gain">
        <input type="range" class="gain-slider" min="0" max="2" step="0.01" value="1">
        <span class="gain-value">1.00</span>
      </div>
      <div class="track-waveform-wrap">
        <canvas class="waveform"></canvas>
        <div class="playhead"></div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
